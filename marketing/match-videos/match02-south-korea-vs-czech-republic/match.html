<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorldCup26 Legends — Match 2: South Korea vs Czech Republic</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #050608; }
  #root { position: fixed; inset: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root" data-screen-label="WC26 Match 2 · t=0s"></div>

<!-- React + Babel (pinned, same stack as the worldcup26 ad) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="match-kit.jsx"></script>
<script type="text/babel" src="match-scenes.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

// Scene timeline (global seconds) — 300s. Keep in sync with narration.json
// (VO slots) and clips.json (video clip placements).
const SCENES = [
  { c: SceneColdOpen, start: 0,     end: 16.0 },
  { c: SceneTitle,    start: 16.0,  end: 28.0 },
  { c: SceneStadium,  start: 28.0,  end: 44.0 },
  { c: SceneHistory,  start: 44.0,  end: 98.5 },
  { c: SceneKorea,    start: 98.5,  end: 133.5 },
  { c: SceneCzech,    start: 133.5, end: 164.5 },
  { c: SceneDuel,     start: 164.5, end: 186.0 },
  { c: SceneDrama,    start: 186.0, end: 242.0 },
  { c: SceneVerdict,  start: 242.0, end: 262.0 },
  { c: SceneApp,      start: 262.0, end: 286.0 },
  { c: SceneCTA,      start: 286.0, end: 300.0 },
];
const DURATION = 300.0;

function ScreenLabeler() {
  const time = useTime();
  useEffect(() => {
    const root = document.getElementById('root');
    if (root) root.dataset.screenLabel = `WC26 Match 2 · t=${Math.floor(time)}s`;
  }, [Math.floor(time)]);
  return null;
}

function SeekBridge() {
  const tl = useTimeline();
  useEffect(() => {
    window.__seek = (t) => { tl.setPlaying(false); tl.setTime(t); };
  }, [tl.setTime, tl.setPlaying]);
  return null;
}

function MatchVideo() {
  return (
    <Stage width={1920} height={1080} duration={DURATION} background="#050608" persistKey="wc26m02">
      <ScreenLabeler />
      <SeekBridge />
      {SCENES.map((s, i) => (
        <Sprite key={i} start={s.start} end={s.end}>
          <s.c />
        </Sprite>
      ))}
    </Stage>
  );
}

function boot() {
  ReactDOM.createRoot(document.getElementById('root')).render(<MatchVideo />);
}
// Load clip placements first so ClipSprite/mux can never drift apart.
fetch('./clips.json')
  .then((r) => r.json())
  .then((d) => { window.MV_CLIPS = d.clips || []; })
  .catch((e) => { console.warn('clips.json load failed', e); window.MV_CLIPS = []; })
  .finally(boot);
</script>
</body>
</html>
