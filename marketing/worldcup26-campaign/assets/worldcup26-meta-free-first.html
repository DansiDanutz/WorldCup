<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WorldCup26 Free First Meta Creative</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: #f6fff9;
      background:
        radial-gradient(circle at 78% 14%, rgba(255, 213, 110, .34), transparent 26%),
        radial-gradient(circle at 14% 16%, rgba(45, 209, 142, .32), transparent 28%),
        linear-gradient(135deg, #031a13 0%, #062c20 45%, #0b3a29 100%);
    }
    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      padding: 76px 72px;
      isolation: isolate;
    }
    .pitch {
      position: absolute;
      inset: 160px 64px 236px;
      border: 3px solid rgba(229, 255, 239, .14);
      border-radius: 24px;
      opacity: .9;
      z-index: -2;
    }
    .pitch::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 3px;
      background: rgba(229, 255, 239, .12);
    }
    .pitch::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      left: calc(50% - 140px);
      top: calc(50% - 140px);
      border: 3px solid rgba(229, 255, 239, .12);
      border-radius: 50%;
    }
    .players {
      position: absolute;
      inset: 360px 56px 420px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: -1;
      opacity: .5;
    }
    .player {
      width: 82px;
      height: 178px;
      position: relative;
      color: rgba(246, 255, 249, .42);
    }
    .player::before {
      content: "";
      position: absolute;
      width: 42px;
      height: 42px;
      left: 20px;
      top: 0;
      border-radius: 50%;
      background: currentColor;
    }
    .player::after {
      content: "";
      position: absolute;
      width: 54px;
      height: 126px;
      left: 14px;
      top: 52px;
      clip-path: polygon(50% 0, 80% 38%, 100% 88%, 72% 88%, 58% 100%, 42% 100%, 28% 88%, 0 88%, 20% 38%);
      background: currentColor;
    }
    .player:nth-child(2), .player:nth-child(5) { color: rgba(57, 214, 144, .46); }
    .player:nth-child(4), .player:nth-child(7) { color: rgba(255, 213, 110, .42); }
    .eyebrow {
      margin: 0 0 64px;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 10px;
      font-weight: 900;
      color: #7df0bd;
      text-transform: uppercase;
    }
    h1 {
      width: 820px;
      margin: 0;
      font-size: 104px;
      line-height: .96;
      letter-spacing: 0;
      font-weight: 950;
      text-wrap: balance;
    }
    .sub {
      width: 780px;
      margin: 34px 0 0;
      font-size: 42px;
      line-height: 1.16;
      font-weight: 850;
      color: rgba(246, 255, 249, .9);
    }
    .info {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 82px;
      padding: 34px 38px 32px;
      border: 3px solid rgba(255, 213, 110, .9);
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(4, 72, 51, .96), rgba(16, 115, 78, .9));
      box-shadow: 0 28px 60px rgba(0, 0, 0, .28);
    }
    .label {
      margin: 0 0 18px;
      font-size: 28px;
      letter-spacing: 8px;
      line-height: 1;
      color: #a7f5cf;
      font-weight: 950;
      text-transform: uppercase;
    }
    .code {
      margin: 0 0 26px;
      font-size: 68px;
      line-height: 1;
      letter-spacing: 4px;
      font-weight: 950;
      color: #ffde83;
    }
    .url {
      margin: 0;
      padding: 18px 22px;
      border-radius: 20px;
      background: rgba(255, 255, 255, .13);
      border: 1px solid rgba(255, 255, 255, .22);
      font-size: 31px;
      line-height: 1.15;
      font-weight: 900;
      color: #f8fff9;
    }
    .teams {
      margin: 20px 0 0;
      color: #e8fff4;
      font-size: 25px;
      line-height: 1.2;
      font-weight: 850;
    }
  </style>
</head>
<body>
  <main class="canvas">
    <div class="pitch"></div>
    <div class="players" aria-hidden="true">
      <div class="player"></div>
      <div class="player"></div>
      <div class="player"></div>
      <div class="player"></div>
      <div class="player"></div>
      <div class="player"></div>
      <div class="player"></div>
    </div>
    <p class="eyebrow">WorldCup26 Invite</p>
    <h1>Pick 3 teams free first.</h1>
    <p class="sub">Create your private points preview before kickoff.</p>
    <section class="info">
      <p class="label">Use referral code</p>
      <p class="code">26BC4B90CB</p>
      <p class="url">worldcup26.world/login?ref=26BC4B90CB</p>
      <p class="teams">All 48 teams are still available before kickoff.</p>
    </section>
  </main>
</body>
</html>
