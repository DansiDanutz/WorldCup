<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WorldCup26 — Ad (vertical 9:16)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; }
  #root { position: fixed; inset: 0; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root" data-screen-label="WorldCup26 ad · vertical · t=0s"></div>

<script src="worldcup-data.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="wc-kit.jsx"></script>
<script type="text/babel" src="wc-scenes.jsx"></script>
<script type="text/babel" src="wc-scenes-vertical.jsx"></script>

<script type="text/babel">
const { useEffect } = React;

// Vertical scene timeline — same windows/story as the landscape spot.
const SCENES = [
  { c: VHook,  start: 0,    end: 8.0  },
  { c: VPick,  start: 8.0,  end: 22.0 },
  { c: VCoef,  start: 22.0, end: 36.0 },
  { c: VBoard, start: 36.0, end: 50.0 },
  { c: VPrize, start: 50.0, end: 62.0 },
  { c: VRefer, start: 62.0, end: 84.0 },
  { c: VCTA,   start: 84.0, end: 90.0 },
];
const DURATION = 90.0;

// ── Voiceover (loaded from narration.json — single source of truth) ──────────
let NARRATION = [];

let _voice = null;
function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  const pick = () => {
    const vs = window.speechSynthesis.getVoices();
    if (!vs || !vs.length) return;
    _voice = vs.find(v => /en[-_]?(US|GB)/i.test(v.lang) && /google|natural|samantha|daniel|aaron/i.test(v.name))
      || vs.find(v => /^en/i.test(v.lang)) || vs[0];
  };
  pick();
  window.speechSynthesis.onvoiceschanged = pick;
}
loadVoices();

function speakLine(text) {
  if (!('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.97; u.pitch = 1.02; u.volume = 1;
    if (_voice) u.voice = _voice;
    window.speechSynthesis.speak(u);
  } catch (e) {}
}

function Narrator() {
  const { time, playing } = useTimeline();
  const prevRef = React.useRef(time);
  const firedRef = React.useRef(new Set());
  useEffect(() => {
    const prev = prevRef.current;
    if (time < prev - 0.25) { firedRef.current.clear(); if ('speechSynthesis' in window) window.speechSynthesis.cancel(); }
    prevRef.current = time;
    if (!playing || window.__wcVoiceEnabled === false) return;
    NARRATION.forEach((line, i) => {
      if (!firedRef.current.has(i) && prev < line.at && time >= line.at) { firedRef.current.add(i); speakLine(line.text); }
    });
  }, [time, playing]);
  useEffect(() => { if (!playing && 'speechSynthesis' in window) window.speechSynthesis.cancel(); }, [playing]);
  return null;
}

function VoiceToggle() {
  const [on, setOn] = React.useState(false);
  useEffect(() => { window.__wcVoiceEnabled = on; if (!on && 'speechSynthesis' in window) window.speechSynthesis.cancel(); }, [on]);
  const toggle = () => { const next = !on; setOn(next); if (next) { try { const u = new SpeechSynthesisUtterance(' '); u.volume = 0; window.speechSynthesis.speak(u); } catch (e) {} } };
  return (
    <button onClick={toggle} title="Toggle voiceover" style={{
      position: 'fixed', top: 16, right: 16, zIndex: 60, display: 'flex', alignItems: 'center', gap: 8,
      background: on ? 'rgba(16,107,79,0.92)' : 'rgba(12,29,26,0.7)', color: '#fff',
      fontFamily: 'Inter, system-ui, sans-serif', fontWeight: 700, fontSize: 14,
      border: 'none', borderRadius: 999, padding: '9px 16px', cursor: 'pointer', boxShadow: '0 6px 18px rgba(0,0,0,0.35)',
    }}>{on ? 'Voice on' : 'Voice off'}</button>
  );
}

function ScreenLabeler() {
  const time = useTime();
  useEffect(() => { const r = document.getElementById('root'); if (r) r.dataset.screenLabel = `WorldCup26 ad · vertical · t=${Math.floor(time)}s`; }, [Math.floor(time)]);
  return null;
}

function SeekBridge() {
  const tl = useTimeline();
  useEffect(() => { window.__seek = (t) => { tl.setPlaying(false); tl.setTime(t); }; }, [tl.setTime, tl.setPlaying]);
  return null;
}

function Ad() {
  return (
    <Stage width={1080} height={1920} duration={DURATION} background={WC.bg} persistKey="wc26adv">
      <Backdrop />
      <Watermark />
      <ScreenLabeler />
      <SeekBridge />
      <Narrator />
      {SCENES.map((s, i) => (
        <Sprite key={i} start={s.start} end={s.end}><s.c /></Sprite>
      ))}
    </Stage>
  );
}

function bootAd() {
  ReactDOM.createRoot(document.getElementById('root')).render(
    <React.Fragment><Ad /><VoiceToggle /></React.Fragment>
  );
}
fetch('./narration.json')
  .then((r) => r.json())
  .then((d) => { NARRATION = Array.isArray(d) ? d : (d.lines || []); })
  .catch((e) => { console.warn('narration.json load failed; preview voice disabled', e); })
  .finally(bootAd);
</script>
</body>
</html>
