<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1280" viewBox="0 0 720 1280" role="img" aria-label="WorldCup26.world hero poster preview — 9:16 portrait card with Pick 3 Teams and Top 10 Rewarded mini-cards">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#11201d"/>
      <stop offset="0.42" stop-color="#15242a"/>
      <stop offset="0.64" stop-color="#3a1418"/>
      <stop offset="1" stop-color="#5d141b"/>
    </linearGradient>
    <radialGradient id="glowL" cx="0.22" cy="0.20" r="0.6">
      <stop offset="0" stop-color="#96aab4" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#96aab4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="0.82" cy="0.74" r="0.6">
      <stop offset="0" stop-color="#a8202a" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#a8202a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0.44" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.50" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.56" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040c0a" stop-opacity="0.60"/>
      <stop offset="0.20" stop-color="#040c0a" stop-opacity="0.08"/>
      <stop offset="0.44" stop-color="#040c0a" stop-opacity="0.12"/>
      <stop offset="0.76" stop-color="#040c0a" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#040c0a" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#138a64"/>
      <stop offset="1" stop-color="#0c5a42"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd980"/>
      <stop offset="1" stop-color="#e7b24e"/>
    </linearGradient>
    <clipPath id="frame"><rect width="720" height="1280" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#frame)" font-family="Inter, system-ui, sans-serif">
    <rect width="720" height="1280" fill="url(#base)"/>
    <rect width="720" height="1280" fill="url(#glowL)"/>
    <rect width="720" height="1280" fill="url(#glowR)"/>
    <rect width="720" height="1280" fill="url(#seam)"/>
    <rect width="720" height="1280" fill="url(#scrim)"/>

    <!-- Brand mini-card (1): WorldCup26.world -->
    <rect x="40" y="40" width="372" height="96" rx="18" fill="#0a1714" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="56" y="56" width="64" height="64" rx="14" fill="url(#mark)"/>
    <g transform="translate(70 70) scale(1.5)" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
      <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
      <path d="M4 22h16"/>
      <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
      <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
      <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
    </g>
    <text x="136" y="92" font-size="30" font-weight="850" letter-spacing="-0.3" fill="#ffffff">WorldCup26<tspan fill="#c9942e">.world</tspan></text>
    <text x="137" y="116" font-size="16" font-weight="650" fill="#ffffff" fill-opacity="0.72">Predict the Game</text>

    <!-- Edition pill: 2026 -->
    <rect x="560" y="44" width="120" height="52" rx="26" fill="#0a1714" fill-opacity="0.45" stroke="#ffffff" stroke-opacity="0.22"/>
    <circle cx="588" cy="70" r="11" fill="#c9942e" fill-opacity="0.22"/>
    <circle cx="588" cy="70" r="6" fill="#c9942e"/>
    <text x="606" y="78" font-size="20" font-weight="800" letter-spacing="2" fill="#ffffff">2026</text>

    <!-- Center VS medallion -->
    <circle cx="360" cy="468" r="54" fill="#0a1714" fill-opacity="0.40" stroke="#ffffff" stroke-opacity="0.28"/>
    <text x="360" y="484" font-size="42" font-weight="900" font-style="italic" text-anchor="middle" fill="#ffffff">VS</text>

    <!-- Mini-card (2): Pick 3 Teams -->
    <rect x="40" y="946" width="640" height="96" rx="16" fill="#0a1714" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="58" y="961" width="66" height="66" rx="14" fill="#138a64" fill-opacity="0.30" stroke="#78dcbc" stroke-opacity="0.30"/>
    <circle cx="75" cy="994" r="8" fill="#106b4f"/>
    <circle cx="91" cy="994" r="8" fill="#2f5fbd"/>
    <circle cx="107" cy="994" r="8" fill="#b66b16"/>
    <text x="140" y="994" font-size="28" font-weight="820" letter-spacing="-0.3" fill="#ffffff">Pick 3 Teams</text>
    <text x="140" y="1022" font-size="19" fill="#ffffff" fill-opacity="0.76">Climb the leaderboard.</text>

    <!-- Mini-card (3): Top 10 Rewarded -->
    <rect x="40" y="1060" width="640" height="96" rx="16" fill="#0a1714" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.16"/>
    <rect x="58" y="1075" width="66" height="66" rx="14" fill="#138a64" fill-opacity="0.30" stroke="#78dcbc" stroke-opacity="0.30"/>
    <path d="M91 1094 L94.5 1103.2 L104.3 1103.7 L96.7 1109.9 L99.2 1119.3 L91 1114 L82.8 1119.3 L85.3 1109.9 L77.7 1103.7 L87.5 1103.2 Z" fill="#d8f3e9"/>
    <text x="140" y="1108" font-size="28" font-weight="820" letter-spacing="-0.3" fill="#ffffff">Top 10 Rewarded</text>
    <text x="140" y="1136" font-size="19" fill="#ffffff" fill-opacity="0.76">The <tspan fill="#c9942e" font-weight="800">top 10</tspan> share the prize pool.</text>

    <!-- Full-width CTA -->
    <rect x="40" y="1174" width="640" height="66" rx="16" fill="url(#gold)"/>
    <text x="360" y="1215" font-size="23" font-weight="850" text-anchor="middle" fill="#07231a">Play now  →</text>

    <rect x="0.5" y="0.5" width="719" height="1279" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>
</svg>
